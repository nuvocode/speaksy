version: '3.9'

services:
  app:
    build: .
    image: nuvocode/speaksy
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - KOKORO_URL=http://kokoro:8880
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LMSTUDIO_BASE_URL=http://host.docker.internal:1234
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kokoro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.2
    ports:
      - "8880:8880"
    # image: ghcr.io/remsky/kokoro-fastapi-gpu:v0.2.2 # for gpu
